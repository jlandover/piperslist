<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit your listing — PipersList</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  :root { --forest: #2D4A3E; --cream: #F7F3EA; --ink: #1F2421; --muted: #6B7270; --line: #E4DFD2; --ok: #4A7C59; --danger: #B33A3A; }
  body { background: var(--cream); color: var(--ink); padding: 20px; }
  .container { max-width: 520px; margin: 40px auto; }
  h1 { color: var(--forest); font-size: 24px; margin-bottom: 6px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .card { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 28px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: var(--ink); }
  input, select, textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--cream); }
  input:focus, textarea:focus { outline: none; border-color: var(--forest); background: white; }
  .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .checks label { display: flex; align-items: center; gap: 8px; margin: 0; font-weight: 400; font-size: 14px; cursor: pointer; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--cream); }
  .checks input { width: auto; }
  .btn { width: 100%; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 16px; }
  .btn-save { background: var(--forest); color: white; }
  .btn-save:hover { background: #1E3429; }
  .btn-delete { background: white; color: var(--danger); border: 1.5px solid var(--danger); margin-top: 10px; }
  .btn-delete:hover { background: #fef0f0; }
  .success { background: #E8F0EA; color: var(--ok); padding: 14px; border-radius: 8px; margin-top: 16px; text-align: center; font-size: 14px; font-weight: 600; display: none; }
  .error { text-align: center; color: var(--danger); padding: 40px; font-size: 16px; }
  .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 16px; }
</style>
</head>
<body>

<div class="container">
  <h1>Edit your listing</h1>
  <p class="sub">Update your info or delete your listing anytime.</p>

  <div id="loading" class="loading">Loading your listing...</div>
  <div id="not-found" class="error" style="display:none;">Listing not found. This link may have expired or been used already.</div>

  <div class="card" id="edit-form" style="display:none;">
    <label>First name</label>
    <input id="f-name" required>

    <label>Age</label>
    <input id="f-age" type="number" min="12" max="25" required>

    <label>Services</label>
    <div class="checks">
      <label><input type="checkbox" id="c-baby"> Babysitting</label>
      <label><input type="checkbox" id="c-dog"> Dog walking</label>
      <label><input type="checkbox" id="c-yard"> Yard help</label>
      <label><input type="checkbox" id="c-tutor"> Tutoring</label>
    </div>

    <label>Other service</label>
    <input id="f-other" placeholder="e.g. swim lessons, tech help">

    <label>Rate</label>
    <input id="f-rate" required placeholder="$12/walk">

    <label>Parent email</label>
    <input id="f-email" type="email" required>

    <button class="btn btn-save" onclick="saveChanges()">Save changes</button>
    <button class="btn btn-delete" onclick="deleteListing()">Delete my listing</button>
    <div class="success" id="msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://brezapyroueqvznuiatb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_5vwIdN4tIa-MwxUFM4xTog_1ka8Y27X';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const params = new URLSearchParams(window.location.search);
  const editKey = params.get('key');
  let helperId = null;

  async function loadListing() {
    if (!editKey) { showError(); return; }

    const { data, error } = await sb.from('helpers').select('*').eq('edit_key', editKey).single();
    if (error || !data) { showError(); return; }

    helperId = data.id;
    document.getElementById('f-name').value = data.first_name;
    document.getElementById('f-age').value = data.age;
    document.getElementById('c-baby').checked = data.services.includes('Babysitting');
    document.getElementById('c-dog').checked = data.services.includes('Dog walking');
    document.getElementById('c-yard').checked = data.services.includes('Yard help');
    document.getElementById('c-tutor').checked = data.services.includes('Tutoring');
    document.getElementById('f-other').value = data.other_service || '';
    document.getElementById('f-rate').value = data.rate;
    document.getElementById('f-email').value = data.parent_email;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('edit-form').style.display = 'block';
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
  }

  async function saveChanges() {
    const services = [];
    if (document.getElementById('c-baby').checked) services.push('Babysitting');
    if (document.getElementById('c-dog').checked) services.push('Dog walking');
    if (document.getElementById('c-yard').checked) services.push('Yard help');
    if (document.getElementById('c-tutor').checked) services.push('Tutoring');

    const { error } = await sb.from('helpers').update({
      first_name: document.getElementById('f-name').value,
      age: parseInt(document.getElementById('f-age').value),
      services: services,
      other_service: document.getElementById('f-other').value || null,
      rate: document.getElementById('f-rate').value,
      parent_email: document.getElementById('f-email').value
    }).eq('edit_key', editKey);

    const msg = document.getElementById('msg');
    if (error) {
      msg.style.display = 'block';
      msg.style.background = '#fef0f0';
      msg.style.color = '#B33A3A';
      msg.textContent = 'Error saving: ' + error.message;
    } else {
      msg.style.display = 'block';
      msg.style.background = '#E8F0EA';
      msg.style.color = '#4A7C59';
      msg.textContent = '✓ Listing updated!';
    }
  }

  async function deleteListing() {
    if (!confirm('Are you sure you want to delete your listing? This cannot be undone.')) return;

    const { error } = await sb.from('helpers').delete().eq('edit_key', editKey);
    if (error) {
      alert('Error deleting: ' + error.message);
    } else {
      document.getElementById('edit-form').style.display = 'none';
      const msg = document.getElementById('msg');
      msg.style.display = 'block';
      msg.style.background = '#E8F0EA';
      msg.style.color = '#4A7C59';
      msg.textContent = '✓ Listing deleted. You can close this page.';
      document.querySelector('.card') && (document.querySelector('.card').style.display = 'none');
      msg.style.display = 'block';
      document.querySelector('.container').appendChild(msg);
    }
  }

  loadListing();
</script>
</body>
</html>
